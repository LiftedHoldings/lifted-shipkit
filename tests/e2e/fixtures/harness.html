<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ShipKit widget — E2E harness</title>
  <style>
    /* The harness page itself must be a11y-clean so axe measures only the widget. */
    body { margin: 0; background: #0B1020; color: #EFF3F9;
      font: 15px ui-sans-serif, -apple-system, "Segoe UI", Roboto, sans-serif; padding: 24px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    main { max-width: 460px; margin: 0 auto; }
  </style>
</head>
<body>
  <main>
    <h1 class="sr-only">ShipKit widget end-to-end test harness</h1>
    <div id="ship" aria-label="ShipKit label checkout"></div>
  </main>

  <!-- The REAL, shipped widget — exactly the file self-hosters and the CDN serve. -->
  <script src="../../../src/main/resources/public/js/shipkit.js"></script>
  <script>
    'use strict';
    // -----------------------------------------------------------------------
    // In-page mock backend — returns the EXACT canonical §2 REST shapes:
    // snake_case keys, STRING rate amounts, a server-computed payment amount,
    // and a forced 3-D Secure liability shift. Nothing is charged; no key is
    // needed. The widget is driven exactly as a self-hoster would drive it.
    // -----------------------------------------------------------------------
    function makeMock() {
      var sessions = Object.create(null);
      var ratePrices = Object.create(null);

      function json(body, status) {
        return new Response(JSON.stringify(body), {
          status: status || 200,
          headers: { 'Content-Type': 'application/json' }
        });
      }

      return function mockFetch(url, options) {
        options = options || {};
        // endpoint is '/api'; strip everything up to and including it.
        var path = String(url).replace(/^.*\/api/, '');
        var method = (options.method || 'GET').toUpperCase();

        return Promise.resolve().then(function () {
          if (path === '/address/verify' && method === 'POST') {
            var a = JSON.parse(options.body || '{}');
            return json({
              verified: true,
              address: {
                name: a.name, company: '', street1: a.street1, street2: a.street2 || '',
                city: a.city, state: (a.state || '').toUpperCase(),
                zip: a.zip, country: a.country || 'US', phone: a.phone || ''
              },
              residential: true,
              errors: [],
              messages: []
            });
          }

          if (path === '/shipment/create' && method === 'POST') {
            // Deliberately UNSORTED, and one rate carries a null delivery_days,
            // so the test proves the widget sorts by decimal and preselects the
            // cheapest — not merely echoes server order.
            var rates = [
              { id: 'rate_ups_g', carrier: 'UPS', service: 'Ground', rate: '11.20', currency: 'USD', delivery_days: 3 },
              { id: 'rate_usps_ga', carrier: 'USPS', service: 'GroundAdvantage', rate: '7.36', currency: 'USD', delivery_days: 3 },
              { id: 'rate_fedex_2d', carrier: 'FedEx', service: '2Day', rate: '18.90', currency: 'USD', delivery_days: 2, delivery_date_guaranteed: true },
              { id: 'rate_usps_pm', carrier: 'USPS', service: 'Priority', rate: '9.45', currency: 'USD', delivery_days: null }
            ];
            rates.forEach(function (r) { ratePrices[r.id] = Number(r.rate); });
            return json({ id: 'shp_test_1', rates: rates, messages: [] });
          }

          if (path === '/payment/session' && method === 'POST') {
            var body = JSON.parse(options.body || '{}');
            var base = ratePrices[body.rate_id];
            if (base == null) return json({ error: 'Unknown rate_id' }, 422);
            // Server-computed amount (rate + a small managed markup). The
            // client never sends an amount; the widget honors this value.
            var amountNum = Math.round((base * 1.09 + 0.30) * 100) / 100;
            var amountStr = amountNum.toFixed(2);
            var sid = 'sess_test_' + Math.random().toString(36).slice(2, 10);
            // Starts pending: the first status poll returns pending (so the framed
            // 3-D Secure step is genuinely rendered and the poll loop runs), the
            // next poll authorizes with a liability shift.
            sessions[sid] = { status: 'pending', amount: amountStr, polls: 0 };
            var formUrl = 'data:text/html;charset=utf-8,' + encodeURIComponent(
              '<!doctype html><html lang="en"><head><meta charset="utf-8">' +
              '<title>3-D Secure card form (test)</title></head>' +
              '<body style="margin:0;font:14px sans-serif;background:#141D31;color:#EFF3F9;padding:16px">' +
              'Secure hosted card form — test stand-in.</body></html>');
            return json({
              session_id: sid, form_url: formUrl,
              amount: amountStr, currency: 'USD',
              expires_at: new Date(Date.now() + 15 * 60 * 1000).toISOString()
            });
          }

          var sm = path.match(/^\/payment\/status\/(.+)$/);
          if (sm && method === 'GET') {
            var s = sessions[decodeURIComponent(sm[1])];
            if (!s) return json({ status: 'failed', three_ds: null });
            s.polls += 1;
            if (s.polls >= 2) {
              // Frictionless Visa authentication: ECI 05, liability shifted.
              return json({ status: 'approved', three_ds: { eci: '05', cavv: 'TESTCAVV', liability_shift: true } });
            }
            // Forced-3DS gate: pending / no liability shift MUST NOT purchase.
            return json({ status: 'pending', three_ds: null });
          }

          var bm = path.match(/^\/payment\/purchase-label\/(.+)$/);
          if (bm && method === 'POST') {
            return json({
              label_url: 'data:text/plain;charset=utf-8,SHIPKIT-TEST-LABEL',
              qr_code_url: 'data:image/svg+xml,' + encodeURIComponent(
                '<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120">' +
                '<rect width="120" height="120" fill="#fff"/><rect x="20" y="20" width="80" height="80" fill="#0B0F14"/></svg>'),
              tracking_code: '9400 1000 0000 1234 5678 00',
              tracking_url: 'https://example.com/track/9400100000012345678000',
              carrier: 'USPS', service: 'GroundAdvantage'
            });
          }

          return json({ error: 'Unknown mock route: ' + path }, 404);
        });
      };
    }

    // -----------------------------------------------------------------------
    // Event capture + widget bootstrap, exposed to the Playwright test.
    // Both the init-time callbacks (onQuote/onPurchase/onError) AND the
    // instance `.on(event, handler)` subscriptions are recorded separately so
    // the test can prove BOTH surfaces fire.
    // -----------------------------------------------------------------------
    window.__capture = {
      onQuote: [], onPurchase: [], onError: [],
      onEvtQuote: [], onEvtPurchase: [], onEvtError: []
    };
    window.__mockFetch = makeMock();
    window.__widget = null;

    window.__initWidget = function (extra) {
      extra = extra || {};
      var cfg = Object.assign({
        mount: '#ship',
        endpoint: '/api',
        apiKey: 'sk_test_e2e_harness',
        theme: 'dark',
        fetch: window.__mockFetch,
        from: { name: 'ShipKit Store', street1: '410 Terry Ave N', city: 'Seattle', state: 'WA', zip: '98109', country: 'US' },
        onQuote: function (q) { window.__capture.onQuote.push({ shipmentId: q.shipmentId, count: q.rates.length }); },
        onPurchase: function (l) { window.__capture.onPurchase.push({ trackingCode: l.trackingCode, carrier: l.carrier }); },
        onError: function (e) { window.__capture.onError.push({ message: e.message, stage: e.stage }); }
      }, extra);

      var w = window.ShipKit.init(cfg);
      // Prove `.on()` adds ADDITIONAL handlers alongside the init callbacks,
      // and that it is chainable.
      w.on('quote', function (q) { window.__capture.onEvtQuote.push({ count: q.rates.length }); })
       .on('purchase', function (l) { window.__capture.onEvtPurchase.push({ trackingCode: l.trackingCode }); })
       .on('error', function (e) { window.__capture.onEvtError.push({ stage: e.stage }); });

      window.__widget = w;
      return true;
    };
  </script>
</body>
</html>
